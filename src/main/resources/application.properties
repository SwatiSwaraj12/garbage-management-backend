# =============================
# DATABASE CONFIGURATION
# =============================
 spring.datasource.url=jdbc:mysql://127.0.0.1:3306/garbage_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / HIBERNATE CONFIGURATION
# =============================
# update: auto-creates/updates tables from entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================
# SERVER CONFIGURATION
# =============================
server.port=8081

# =============================
# JWT CONFIGURATION
# =============================
# Change this secret in production to a long random string
app.jwt.secret=GarbageManagementSystemSecretKey2024VeryLongSecretForHS256Algorithm
app.jwt.expiration=86400000

# =============================
# LOGGING
# =============================
logging.level.com.garbage=DEBUG
logging.level.org.springframework.security=INFO
