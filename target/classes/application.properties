# =============================
# DATABASE CONFIGURATION
# 
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

server.port=${PORT:8081}

# =============================
# JPA / HIBERNATE CONFIGURATION
# =============================
# update: auto-creates/updates tables from entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

 
# =============================
# JWT CONFIGURATION
# =============================
# Change this secret in production to a long random string
app.jwt.secret=GarbageManagementSystemSecretKey2024VeryLongSecretForHS256Algorithm
app.jwt.expiration=86400000

# =============================
# LOGGING
# =============================
logging.level.com.garbage=DEBUG
logging.level.org.springframework.security=INFO
